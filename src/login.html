<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Adoption & Child Care System</title>
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary-color: #2196F3;
            --background-color: #2196F3;
            --card-radius: 20px;
            --error-color: #f44336;
            --success-color: #4caf50;
        }

        body {
            font-family: 'Roboto', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: var(--card-radius);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            padding: 32px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .auth-header {
            margin-bottom: 24px;
        }

        .auth-header .material-icons {
            font-size: 48px;
            color: var(--primary-color);
            margin-bottom: 12px;
        }

        .auth-card h1 {
            color: var(--primary-color);
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .form-group {
            position: relative;
            margin-bottom: 16px;
            text-align: left;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .material-icons {
            position: absolute;
            left: 12px;
            color: #666;
            font-size: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 12px 12px 44px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            border-width: 2px;
        }

        .btn-primary {
            width: 100%;
            height: 50px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
        }

        .auth-footer button {
            background: none;
            border: none;
            color: var(--primary-color);
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .error-message {
            color: var(--error-color);
            font-size: 12px;
            text-align: center;
            margin-bottom: 12px;
            display: none;
        }

        .success-message {
            color: var(--success-color);
            font-size: 12px;
            text-align: center;
            margin-bottom: 12px;
            display: none;
        }

        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .db-status {
            margin-top: 16px;
            font-size: 10px;
            color: #999;
        }
        .db-status .online { color: var(--success-color); }
        .db-status .offline { color: var(--error-color); }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <span class="material-icons">lock</span>
            <h1>Login</h1>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <!-- Email/Username -->
            <div class="form-group">
                <div class="input-wrapper">
                    <span class="material-icons">email</span>
                    <input type="text" id="email" placeholder="Email or Username" required autocomplete="username">
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <div class="input-wrapper">
                    <span class="material-icons">vpn_key</span>
                    <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-primary" id="loginBtn">
                <span id="btnText">Login</span>
                <div id="btnLoading" class="loading-spinner" style="display: none;"></div>
            </button>
        </form>

        <div class="auth-footer">
            <button onclick="window.location.href='/register.html'">Don't have an account? Register</button>
        </div>

        <div class="db-status" id="dbStatus">
            Server Status: Checking...
        </div>
    </div>

    <script src="/js/api-service.js"></script>
    <script>
        if (apiService.isAuthenticated()) {
            window.location.href = '/dashboard.html';
        }

        async function checkServerStatus() {
            try {
                const data = await apiService.getDatabaseStatus();
                const statusEl = document.getElementById('dbStatus');
                if (data.success) {
                    statusEl.innerHTML = 'Server Status: <span class="online">Online</span>';
                } else {
                    statusEl.innerHTML = 'Server Status: <span class="offline">DB Error</span>';
                }
            } catch (e) {
                document.getElementById('dbStatus').innerHTML = 'Server Status: <span class="offline">Offline</span>';
            }
        }
        checkServerStatus();

        async function handleLogin(e) {
            e.preventDefault();

            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');
            const errorEl = document.getElementById('errorMessage');
            const successEl = document.getElementById('successMessage');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                errorEl.textContent = "Please enter both credentials.";
                errorEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'block';

            try {
                const response = await apiService.login(email, password);
                if (response.success) {
                    successEl.textContent = "Login successful! Redirecting...";
                    successEl.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 800);
                } else {
                    errorEl.textContent = response.error?.message || "Invalid credentials.";
                    errorEl.style.display = 'block';
                    btn.disabled = false;
                    btnText.style.display = 'block';
                    btnLoading.style.display = 'none';
                }
            } catch (err) {
                errorEl.textContent = err.message || "Connection error.";
                errorEl.style.display = 'block';
                btn.disabled = false;
                btnText.style.display = 'block';
                btnLoading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
