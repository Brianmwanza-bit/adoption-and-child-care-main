<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Adoption & Child Care System</title>
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary-color: #2196F3;
            --background-color: #2196F3;
            --card-radius: 20px;
            --error-color: #f44336;
            --success-color: #4caf50;
        }

        body {
            font-family: 'Roboto', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: var(--card-radius);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            padding: 32px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #ddd transparent;
        }

        /* Custom Scrollbar */
        .auth-card::-webkit-scrollbar { width: 6px; }
        .auth-card::-webkit-scrollbar-thumb { background-color: #ddd; border-radius: 10px; }

        .auth-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .profile-photo-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #f5f5f5;
            border: 3px solid var(--primary-color);
            margin: 0 auto 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .profile-photo-container img {
            width: 100%;
            height: 100%;
            object-fit: crop;
            display: none;
        }

        .profile-photo-container .placeholder-icon {
            font-size: 44px;
            color: #9e9e9e;
        }

        .profile-photo-container .placeholder-text {
            font-size: 9px;
            color: #9e9e9e;
            text-transform: uppercase;
        }

        .camera-badge {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 32px;
            height: 32px;
            background: var(--primary-color);
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .camera-badge span { font-size: 16px; }

        .auth-card h1 {
            color: var(--primary-color);
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .form-group {
            position: relative;
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .material-icons {
            position: absolute;
            left: 12px;
            color: #666;
            font-size: 20px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 12px 12px 44px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary-color);
            border-width: 2px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-primary {
            width: 100%;
            height: 50px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
        }

        .auth-footer button {
            background: none;
            border: none;
            color: var(--primary-color);
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .error-message {
            color: var(--error-color);
            font-size: 12px;
            text-align: center;
            margin-bottom: 12px;
            display: none;
        }

        .success-message {
            color: var(--success-color);
            font-size: 12px;
            text-align: center;
            margin-bottom: 12px;
            display: none;
        }

        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #photoInput { display: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <div class="profile-photo-container" onclick="document.getElementById('photoInput').click()">
                <img id="photoPreview" alt="Profile Photo">
                <span class="material-icons placeholder-icon" id="placeholderIcon">person</span>
                <span class="placeholder-text" id="placeholderText">Profile Photo</span>
                <div class="camera-badge">
                    <span class="material-icons">camera_alt</span>
                </div>
            </div>
            <input type="file" id="photoInput" accept="image/*" onchange="previewImage(this)">
            <h1>Register</h1>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <!-- Username -->
            <div class="form-group">
                <div class="input-wrapper">
                    <span class="material-icons">person</span>
                    <input type="text" id="username" placeholder="Username" required>
                </div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <div class="input-wrapper">
                    <span class="material-icons">email</span>
                    <input type="email" id="email" placeholder="Email" required>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <div class="input-wrapper">
                    <span class="material-icons">lock</span>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
            </div>

            <!-- Phone -->
            <div class="form-group">
                <div class="input-wrapper">
                    <span class="material-icons">phone</span>
                    <input type="tel" id="phone" placeholder="Phone" required>
                </div>
            </div>

            <div class="form-row">
                <!-- National ID -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="material-icons">badge</span>
                        <input type="text" id="national_id_no" placeholder="National ID">
                    </div>
                </div>
                <!-- ID Number -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="material-icons">assignment</span>
                        <input type="text" id="id_number" placeholder="ID Number">
                    </div>
                </div>
            </div>

            <!-- Role (Occupation) -->
            <div class="form-group">
                <div class="input-wrapper">
                    <span class="material-icons">work</span>
                    <select id="role" required>
                        <option value="" disabled selected>Select Occupation</option>
                        <option value="Admin">Admin</option>
                        <option value="Case Worker">Case Worker</option>
                        <option value="Guardian">Guardian</option>
                        <option value="Social Worker">Social Worker</option>
                        <option value="Supervisor">Supervisor</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <!-- County -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="material-icons">location_on</span>
                        <input type="text" id="county" placeholder="County">
                    </div>
                </div>
                <!-- Sub-County -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="material-icons">map</span>
                        <input type="text" id="sub_county" placeholder="Sub-County">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="registerBtn">
                <span id="btnText">Register</span>
                <div id="btnLoading" class="loading-spinner" style="display: none;"></div>
            </button>
        </form>

        <div class="auth-footer">
            <button onclick="window.location.href='/login.html'">Already have an account? Login</button>
        </div>
    </div>

    <script src="/js/api-service.js"></script>
    <script>
        function previewImage(input) {
            const preview = document.getElementById('photoPreview');
            const icon = document.getElementById('placeholderIcon');
            const text = document.getElementById('placeholderText');

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    icon.style.display = 'none';
                    text.style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();

            const btn = document.getElementById('registerBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');
            const errorEl = document.getElementById('errorMessage');
            const successEl = document.getElementById('successMessage');

            // Reset messages
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            const userData = {
                username: document.getElementById('username').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                phone: document.getElementById('phone').value.trim(),
                role: document.getElementById('role').value,
                national_id_no: document.getElementById('national_id_no').value.trim(),
                id_number: document.getElementById('id_number').value.trim(),
                county: document.getElementById('county').value.trim(),
                sub_county: document.getElementById('sub_county').value.trim()
            };

            // Basic Validation
            if (!userData.username || !userData.email || !userData.password || !userData.role || !userData.phone) {
                errorEl.textContent = "Please fill in all required fields.";
                errorEl.style.display = 'block';
                return;
            }

            // Start loading
            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'block';

            try {
                const response = await apiService.register(userData);
                if (response.success) {
                    successEl.textContent = "Registration successful! Redirecting to login...";
                    successEl.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    errorEl.textContent = response.error?.message || "Registration failed. Please try again.";
                    errorEl.style.display = 'block';
                    btn.disabled = false;
                    btnText.style.display = 'block';
                    btnLoading.style.display = 'none';
                }
            } catch (err) {
                errorEl.textContent = err.message || "An error occurred during registration.";
                errorEl.style.display = 'block';
                btn.disabled = false;
                btnText.style.display = 'block';
                btnLoading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
