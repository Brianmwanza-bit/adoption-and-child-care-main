<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Adoption & Child Care System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d47a1 0%, #1976d2 50%, #42a5f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 45px 40px;
            max-width: 480px;
            width: 100%;
            max-height: 95vh;
            overflow-y: auto;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header .icon { font-size: 50px; margin-bottom: 12px; }
        .auth-header h1 { color: #0d47a1; font-size: 24px; margin-bottom: 6px; }
        .auth-header p { color: #666; font-size: 14px; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
            font-size: 13px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            background: #fafafa;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #1976d2;
            background: white;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0d47a1, #1976d2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #093170, #0d47a1);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(13, 71, 161, 0.3);
        }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .auth-footer a { color: #1976d2; text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }
        .error-message {
            background: #ffebee; color: #c62828;
            padding: 12px 16px; border-radius: 10px;
            margin-bottom: 16px; font-size: 13px;
            display: none; border-left: 4px solid #c62828;
        }
        .success-message {
            background: #e8f5e9; color: #2e7d32;
            padding: 12px 16px; border-radius: 10px;
            margin-bottom: 16px; font-size: 13px;
            display: none; border-left: 4px solid #2e7d32;
        }
        .loading {
            display: inline-block;
            width: 18px; height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s ease-in-out infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .required { color: #c62828; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="icon">&#x1F464;</div>
            <h1>Create Account</h1>
            <p>Join the Adoption & Child Care System</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-row">
                <div class="form-group">
                    <label for="username">Username <span class="required">*</span></label>
                    <input type="text" id="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password <span class="required">*</span></label>
                <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
                <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role">
                        <option value="viewer">Viewer</option>
                        <option value="case_worker">Case Worker</option>
                        <option value="admin">Admin</option>
                        <option value="supervisor">Supervisor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" placeholder="+254...">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="national_id_no">National ID No.</label>
                    <input type="text" id="national_id_no" placeholder="ID number">
                </div>
                <div class="form-group">
                    <label for="county">County</label>
                    <input type="text" id="county" placeholder="e.g. Nairobi">
                </div>
            </div>

            <button type="submit" class="btn-primary" id="registerBtn">
                Create Account
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="/login.html">Sign In</a></p>
        </div>
    </div>

    <script src="/js/api-service.js"></script>
    <script>
        if (apiService.isAuthenticated()) {
            window.location.href = '/dashboard.html';
        }

        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMessage');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showError('Passwords do not match.');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Creating account...';
            document.getElementById('errorMessage').style.display = 'none';

            const userData = {
                username: document.getElementById('username').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: password,
                role: document.getElementById('role').value,
                phone: document.getElementById('phone').value.trim(),
                national_id_no: document.getElementById('national_id_no').value.trim(),
                county: document.getElementById('county').value.trim(),
                sub_county: ''
            };

            try {
                const response = await apiService.register(userData);
                if (response.success) {
                    showSuccess('Account created successfully! Redirecting...');
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1000);
                } else {
                    showError(response.error?.message || 'Registration failed.');
                    btn.disabled = false;
                    btn.innerHTML = 'Create Account';
                }
            } catch (err) {
                showError(err.message || 'Cannot connect to server.');
                btn.disabled = false;
                btn.innerHTML = 'Create Account';
            }
        }
    </script>
</body>
</html>
